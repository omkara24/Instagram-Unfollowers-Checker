<!DOCTYPE html>
<html>
<head>
    <title>Instagram Analysis</title>
</head>
<body>

    <h1>Instagram Analysis</h1>

    <hr>

    <h2>Statistics</h2>

    <p><strong>Total Followers:</strong> {{ followers_count }}</p>

    <p><strong>Total Following:</strong> {{ following_count }}</p>

    <p><strong>Not Following Back:</strong> {{ non_followers_count }}</p>

    <hr>

    <h2>People Who Don't Follow You Back</h2>

    <ul>
        {% for user in non_followers %}
            <li>{{ user }}</li>
        {% endfor %}
    </ul>

    <br>

    <a href="/">Check Again</a>

</body>
</html>

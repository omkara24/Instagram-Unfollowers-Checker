<!DOCTYPE html>
<html>
<head>

    <title>Instagram Analysis</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="container">

    <h1>Instagram Analyzer</h1>

    <div class="stats">

        <div class="stat-card">
            <h2>Followers</h2>
            <p>{{ followers_count }}</p>
        </div>

        <div class="stat-card">
            <h2>Following</h2>
            <p>{{ following_count }}</p>
        </div>

        <div class="stat-card">
            <h2>Unfollowers</h2>
            <p>{{ non_followers_count }}</p>
        </div>

    </div>

    <div class="results">

        <h2>People Who Don't Follow You Back</h2>

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Search username..."
            class="search-box"
        >

        <ul>

            {% for user in non_followers %}
                <li class="user-item">
                    {{ user }}
                </li>
            {% endfor %}

        </ul>

        <a href="/" class="back-btn">
            Analyze Again
        </a>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>

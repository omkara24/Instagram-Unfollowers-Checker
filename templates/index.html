<!DOCTYPE html>
<html>
<head>
    <title>Instagram Unfollowers Checker</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Instagram Unfollowers Checker</h1>

        <p class="subtitle">
            Upload your Instagram exported HTML files
        </p>

        <form action="/compare"
              method="POST"
              enctype="multipart/form-data">

            <div class="upload-card">

                <h3>📄 Followers File</h3>

                <input
                    type="file"
                    name="followers"
                    required
                >

            </div>

            <div class="upload-card">

                <h3>👥 Following File</h3>

                <input
                    type="file"
                    name="following"
                    required
                >

            </div>

            <button class="btn" type="submit">
                Analyze Account
            </button>

        </form>

    </div>

</div>

</body>
</html>

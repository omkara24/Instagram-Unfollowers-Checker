<!DOCTYPE html>
<html>
<head>
    <title>Instagram Unfollowers Checker</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="hero">

        <h1>📸 Instagram Unfollowers Checker</h1>

        <p>
            Find people who don't follow you back in seconds.
        </p>

        <div class="feature-row">

            <span class="badge">⚡ Fast</span>

            <span class="badge">🔒 Private</span>

            <span class="badge">📊 Accurate</span>

        </div>

    </div>

    <div class="card">

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form action="/compare"
              method="POST"
              enctype="multipart/form-data">

            <div class="upload-card">

                <h3>📄 Followers File</h3>

                <input
                    type="file"
                    name="followers"
                    accept=".html"
                    required
                >

            </div>

            <div class="upload-card">

                <h3>👥 Following File</h3>

                <input
                    type="file"
                    name="following"
                    accept=".html"
                    required
                >

            </div>

            <button class="btn" type="submit">
                Analyze Account
            </button>

        </form>

    </div>

</div>

</body>
</html>
